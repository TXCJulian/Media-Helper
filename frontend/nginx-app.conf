# Prefer upstream X-Forwarded-Proto (from TLS-terminating proxy), fall back to $scheme
map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen       3000;
    server_name  _;
    client_max_body_size 100m;

    root   /usr/share/nginx/html;
    index  index.html;

    location /rename/ {
        proxy_pass http://renamer-backend:3332/rename/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    location /directories/ {
        proxy_pass http://renamer-backend:3332/directories/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    location /config {
        proxy_pass http://renamer-backend:3332/config;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    location /health {
        proxy_pass http://renamer-backend:3332/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    location /auth/ {
        proxy_pass http://renamer-backend:3332/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
    location /transcribe/ {
        proxy_pass http://renamer-backend:3332/transcribe/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        # SSE: disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
    location /cutter/ {
        client_max_body_size 50G;
        proxy_pass http://renamer-backend:3332/cutter/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Range $http_range;
        # SSE + streaming: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        # Stream uploads without buffering
        proxy_request_buffering off;
    }

    location /download/ {
        proxy_pass http://renamer-backend:3332/download/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        # SSE: disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
