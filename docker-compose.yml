services:
  renamer-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bosscock/media-renamer:backend
    container_name: media-renamer_backend
    restart: unless-stopped
    environment:
      - BASE_PATH=/media
      - TVSHOW_FOLDER_NAME=TV Shows
      - MUSIC_FOLDER_NAME=Music
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - VALID_VIDEO_EXT=.mp4,.mkv,.mov,.avi
      - VALID_MUSIC_EXT=.flac,.wav,.mp3
      - TRANSCRIBER_URL=${TRANSCRIBER_URL:-http://lyric-transcriber:3334}
      - ENABLED_FEATURES=${ENABLED_FEATURES:-episodes,music,lyrics}
      - CUTTER_JOBS_DIR=/data/cutter-jobs
      - CUTTER_JOB_TTL=${CUTTER_JOB_TTL:-86400}
    ports:
      - "3332:3332"
    volumes:
      - ./dependencies/.env:/backend/dependencies/.env:ro
      - /path/to/your/media:/media:rw
      - cutter-jobs:/data/cutter-jobs
    networks:
      - renamer-network

  renamer-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bosscock/media-renamer:frontend
    container_name: media-renamer_frontend
    restart: unless-stopped
    ports:
      - "3333:3000"
    depends_on:
      - renamer-backend
    networks:
      - renamer-network

  lyric-transcriber:
    profiles: ["gpu"]
    build:
      context: ../Whisper_Lyric_Transcriber
      dockerfile: Dockerfile
    image: lyric-transcriber:latest
    container_name: lyric-transcriber
    restart: unless-stopped
    environment:
      - GENIUS_ACCESS_TOKEN=${GENIUS_ACCESS_TOKEN:-}
      - PRELOAD_MODELS=true
      - JOB_TTL_SECONDS=3600
    ports:
      - "3334:3334"
    volumes:
      - transcriber-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - renamer-network

networks:
  renamer-network:
    driver: bridge

volumes:
  cutter-jobs:
  transcriber-models:
