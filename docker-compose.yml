services:
  renamer-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bosscock/media-renamer:backend
    container_name: media-renamer_backend
    restart: unless-stopped
    environment:
      - BASE_PATHS=${BASE_PATHS:-/media}
      # For multiple media paths: BASE_PATHS=/media1,/media2
      # Each needs its own volume mount below
      - TVSHOW_FOLDER_NAME=TV Shows
      - MUSIC_FOLDER_NAME=Music
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - VALID_VIDEO_EXT=.mp4,.mkv,.mov,.avi
      - VALID_MUSIC_EXT=.flac,.wav,.mp3
      - TRANSCRIBER_URL=${TRANSCRIBER_URL:-http://lyric-transcriber:3334}
      - ENABLED_FEATURES=${ENABLED_FEATURES:-episodes,music,lyrics,download}
      - CUTTER_JOBS_DIR=/data/cutter-jobs
      - CUTTER_JOB_TTL=${CUTTER_JOB_TTL:-86400}
      - DOWNLOADER_JOBS_DIR=/data/download-jobs
      - DOWNLOADER_JOB_TTL=${DOWNLOADER_JOB_TTL:-604800}
      - DOWNLOADS_DIR=${DOWNLOADS_DIR:-/downloads}
      - YT_DLP_COOKIES=${YT_DLP_COOKIES:-/data/cookies.txt}
      #- HWACCEL=off  # Uncomment to disable GPU-accelerated video encoding
      #- VAAPI_DEVICE=/dev/dri/renderD128  # Uncomment to override VAAPI device path
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    # --- GPU passthrough (uncomment ONE section matching your hardware) ---
    # NVIDIA GPU:
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: 1
    #          capabilities: [gpu, video]
    # Intel/AMD iGPU:
    #devices:
    #  - /dev/dri:/dev/dri
    # Backend accessed via internal renamer-network only (through nginx on port 3333)
    # ports:
    #   - "3332:3332"
    volumes:
      - ./dependencies/.env:/backend/dependencies/.env:ro
      - /path/to/your/media:/media:rw
      - /path/to/your/downloads:/downloads:rw
      - cutter-jobs:/data/cutter-jobs
      - download-jobs:/data/download-jobs
    networks:
      - renamer-network

  renamer-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bosscock/media-renamer:frontend
    container_name: media-renamer_frontend
    restart: unless-stopped
    ports:
      - "3333:3000"
    depends_on:
      - renamer-backend
    networks:
      - renamer-network

  lyric-transcriber:
    profiles: ["gpu"]
    build:
      context: ../Whisper_Lyric_Transcriber
      dockerfile: Dockerfile
    image: lyric-transcriber:latest
    container_name: lyric-transcriber
    restart: unless-stopped
    environment:
      - GENIUS_ACCESS_TOKEN=${GENIUS_ACCESS_TOKEN:-}
      - PRELOAD_MODELS=true
      - JOB_TTL_SECONDS=3600
    ports:
      - "3334:3334"
    volumes:
      - transcriber-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - renamer-network

networks:
  renamer-network:
    driver: bridge

volumes:
  cutter-jobs:
  download-jobs:
  transcriber-models:
