services:
  renamer-backend:
    image: bosscock/media-renamer:backend
    container_name: media-renamer_backend
    command: []
    environment:
      - ENABLED_FEATURES=episodes,music,lyrics,cutter,download #comma-separated list of enabled features: episodes, music, lyrics, cutter, download. Defaults to episodes,music,lyrics,cutter,download
      - TMDB_API_KEY=YOUR_TMDB_API_KEY_HERE #API key for The Movie Database (TMDb) - required for episode renaming
      - TRANSCRIBER_URL=http://lyric-transcriber:3334 #URL for the lyric transcriber service, required for lyrics feature
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      #- AUTH_USERNAME=admin #set to enable authentication
      #- AUTH_PASSWORD=changeme #set to enable authentication
      #- BASE_PATHS=/media1,/media2  # comma-separated media roots, defaults to /media
      #- TVSHOW_FOLDER_NAME=TV Shows #name of the folder in BASE_PATH where TV shows are stored, defaults to "TV Shows"
      #- MUSIC_FOLDER_NAME=Music #name of the folder in BASE_PATH where music is stored, defaults to "Music"
      #- VALID_VIDEO_EXT=VALID_VIDEO_EXT_HERE #comma-separated list of valid video file extensions for episode renaming, defaults to .mp4,.mkv,.mov,.avi
      #- VALID_MUSIC_EXT=VALID_MUSIC_EXT_HERE #comma-separated list of valid audio file extensions for music renaming, defaults to .mp3,.flac,.m4a,.wav
      #- VALID_CUTTER_EXT=VALID_CUTTER_EXT_HERE #comma-separated list of valid file extensions for cutter module, defaults to .mp4,.mkv,.mov,.avi,.webm,.mp3,.flac,.m4a,.wav,.aac,.ac3,.dts,.opus,.ogg,.aiff
      #- CUTTER_JOBS_DIR=/ #directory where cutter job data is stored, defaults to /data/cutter-jobs (should be a volume mount for persistence and file access)
      #- CUTTER_JOB_TTL=VALID_JOB_TTL_HERE #time in seconds after which cutter jobs are automatically deleted, defaults to 86400 (24 hours)
      #- CUTTER_MAX_DIRECT_REMUX_BYTES=VALID_MAX_DIRECT_REMUX_BYTES_HERE #maximum file size in bytes for direct remuxing in cutter module, defaults to 1073741824 (1 GB)
      #- DOWNLOADER_JOBS_DIR=/ #directory where download job data is stored, defaults to /data/download-jobs (should be a volume mount for persistence)
      #- DOWNLOADER_JOB_TTL=604800 #time in seconds after which download jobs are automatically deleted, defaults to 604800 (7 days)
      #- DOWNLOADS_DIR=/ #root directory where downloaded files are saved, defaults to /downloads
      #- YT_DLP_COOKIES=/ #path to the global cookies.txt file, defaults to /data/cookies.txt
      #- HWACCEL=off  # Uncomment to disable GPU-accelerated video encoding
      #- VAAPI_DEVICE=/dev/dri/renderD128  # Uncomment to override VAAPI device path defaults to /dev/dri/renderD128
    # --- GPU passthrough (uncomment ONE section matching your hardware) ---
    # NVIDIA GPU:
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: 1
    #          capabilities: [gpu, video]
    # Intel/AMD iGPU:
    #devices:
    #  - /dev/dri:/dev/dri
    restart: unless-stopped
    volumes:
      - /path/to/your/media:/media:rw
      - /path/to/your/downloads:/downloads:rw
      - cutter-jobs:/data/cutter-jobs
      - download-jobs:/data/download-jobs
    networks:
      - renamer-network

  renamer-frontend:
    image: bosscock/media-renamer:frontend
    container_name: media-renamer_frontend
    command: []
    depends_on:
      - renamer-backend
    ports:
      - target: 3000
        published: 3333
        protocol: tcp
        mode: host
    restart: unless-stopped
    networks:
      - renamer-network

  lyric-transcriber:
    profiles: ["gpu"]
    image: lyric-transcriber:latest
    container_name: lyric-transcriber
    restart: unless-stopped
    environment:
      - GENIUS_ACCESS_TOKEN=YOUR_GENIUS_ACCESS_TOKEN_HERE #API access token for Genius API, required for lyric transcriber
      - PRELOAD_MODELS=true
      - JOB_TTL_SECONDS=3600
    ports:
      - target: 3334
        published: 3334
        protocol: tcp
    volumes:
      - transcriber-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - renamer-network

networks:
  renamer-network:
    driver: bridge

volumes:
  cutter-jobs:
  download-jobs:
  transcriber-models:
